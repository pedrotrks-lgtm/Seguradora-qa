name: API Tests

on:
  push:
    branches:
      - main
      - master

  pull_request:
    branches:
      - main
      - master

jobs:
  api-tests:
    runs-on: ubuntu-latest

    services:
      mongo:
        image: mongo:7
        ports:
          - 27017:27017

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Instalar dependências backend
        working-directory: backend
        run: npm install

      - name: Subir backend
        working-directory: backend
        env:
          PORT: 3000
          MONGO_URI: mongodb://localhost:27017/seguradora-b3
        run: |
          node server.js &
          sleep 5

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar dependências Robot
        working-directory: insurance-b3
        run: |
          pip install robotframework
          pip install robotframework-requests
          pip install robotframework-jsonlibrary
          pip install robotframework-faker
          pip install robotframework-seleniumlibrary
          pip install pymongo

      - name: Rodar testes de API
        working-directory: insurance-b3
        run: robot qa/tests/api