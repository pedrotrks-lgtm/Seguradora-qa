name: API Tests

on:
  push:
    branches:
      - main
      - master

  pull_request:
    branches:
      - main
      - master

jobs:
  api-tests:
    runs-on: ubuntu-latest

    services:
      mongo:
        image: mongo:7
        ports:
          - 27017:27017

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Instalar dependências backend
        working-directory: backend
        run: npm install

      
      - name: Popular Mongo com usuario QA
        working-directory: backend
        env:
          MONGO_URI: mongodb://localhost:27017/seguradora-b3
        run: |
          node -e "
          const mongoose = require('mongoose');
          const User = require('./models/User');

          mongoose.connect(process.env.MONGO_URI).then(async () => {
            await User.deleteMany({});
            await User.insertMany([
           { email: 'qa@b3.com', password: '123456' },
           { email: 'olivia@b3.com', password: 'abc1234' },
           { email: 'karol@b3.com', password: 'abc12345' }
            ]);
            console.log('Usuários criados no Mongo');
            await mongoose.disconnect();
          });
          "

      - name: Criar .env backend
        working-directory: backend
        run: |
          echo "PORT=3000" > .env
          echo "MONGO_URI=mongodb://localhost:27017/seguradora-b3" >> .env

      - name: Subir backend
        working-directory: backend
        env:
          PORT: 3000
          MONGO_URI: mongodb://localhost:27017/seguradora-b3
        run: |
          node server.js &
          sleep 5

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar dependências Robot
        working-directory: insurance-b3
        run: |
          pip install robotframework
          pip install robotframework-requests
          pip install robotframework-jsonlibrary
          pip install robotframework-faker
          pip install robotframework-seleniumlibrary
          pip install pymongo
          pip install python-dotenv

      - name: Rodar testes de API
        working-directory: insurance-b3
        run: robot qa/tests/api